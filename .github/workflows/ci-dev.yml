name: CI/CD - Microservices Development

on:
  push:
    branches: [main, develop, "release/*"]
    paths:
      - "vote/**"
      - "worker/**"
      - "result/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "vote/**"
      - "worker/**"
      - "result/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # Detect which services changed
  # ─────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      vote: ${{ steps.filter.outputs.vote }}
      worker: ${{ steps.filter.outputs.worker }}
      result: ${{ steps.filter.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vote:
              - 'vote/**'
            worker:
              - 'worker/**'
            result:
              - 'result/**'

  # ─────────────────────────────────────────
  # VOTE SERVICE (Java / Spring Boot)
  # ─────────────────────────────────────────
  vote-build:
    needs: changes
    if: needs.changes.outputs.vote == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vote
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: "22"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B

      - name: Run tests
        run: mvn test -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vote-jar
          path: vote/target/*.jar
          retention-days: 5

  vote-docker:
    needs: vote-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/vote
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: vote
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────
  # WORKER SERVICE (Go)
  # ─────────────────────────────────────────
  worker-build:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"
          cache-dependency-path: worker/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -v -o worker main.go

      - name: Run vet
        run: go vet ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-binary
          path: worker/worker
          retention-days: 5

  worker-docker:
    needs: worker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/worker
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────
  # RESULT SERVICE (Node.js)
  # ─────────────────────────────────────────
  result-build:
    needs: changes
    if: needs.changes.outputs.result == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: result
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: result/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-app
          path: |
            result/server.js
            result/package.json
            result/views/
          retention-days: 5

  result-docker:
    needs: result-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/result
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: result
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
